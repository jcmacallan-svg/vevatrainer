<!-- Replace ONLY the Person Search panel body with this block -->
<div class="cardBody">
  <div id="psOutfit" class="psOutfit"></div>

  <!-- Thumbnail (always visible) -->
  <div class="psTableThumb" id="psTableThumb" role="button" tabindex="0" aria-label="Click to enlarge table view">
    <canvas id="psTableCanvas" class="psTableCanvas"></canvas>
    <div class="psEnlargeHint" aria-hidden="true">
      <span class="psEnlargeIcon">🔍</span><span class="psEnlargePlus">+</span>
      <span class="psEnlargeText">Click to enlarge</span>
    </div>
  </div>

  <!-- Modal (hidden until user clicks) -->
  <div class="psTableModal" id="psTableModal" hidden>
    <div class="psTableModalBackdrop" data-close="1"></div>
    <div class="psTableModalDialog" role="dialog" aria-modal="true" aria-label="Table view">
      <button class="psTableModalClose" type="button" data-close="1" aria-label="Close">✕</button>
      <canvas id="psTableCanvasModal" class="psTableCanvasModal"></canvas>
      <div class="psTableModalHint">Press <kbd>Esc</kbd> to close</div>
    </div>
  </div>

  <div class="cards" id="psCards"></div>
</div>
